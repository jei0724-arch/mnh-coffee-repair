<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수리 접수 신청 - M&H 엠엔에이치</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background:#f7f4ee; color:#1f2937; }
  .spinner { border: 3px solid #e5e7eb; border-top-color: #1b3d37; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="bg-[#1b3d37] text-white sticky top-0 z-20">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <span class="w-9 h-9 rounded-lg bg-white/10 border border-white/20 flex items-center justify-center font-bold text-sm">M&H</span>
      <span class="leading-tight">
        <span class="block font-bold">엠엔에이치</span>
        <span class="block text-[11px] text-white/60">커피 머신 전문 수리</span>
      </span>
    </a>
    <nav class="hidden md:flex items-center gap-8 text-sm text-white/80">
      <a href="index.html" class="hover:text-white">홈</a>
      <a href="gallery.html" class="hover:text-white">수리 사례</a>
      <a href="request.html" class="text-white font-medium">수리 접수</a>
      <a href="contact.html" class="hover:text-white">문의하기</a>
    </nav>
    <a href="request.html" class="bg-white text-[#1b3d37] text-sm font-semibold px-5 py-2.5 rounded-full hover:bg-gray-100">수리 접수하기</a>
  </div>
</header>

<main class="max-w-3xl mx-auto px-6 py-14">
  <h1 class="text-3xl font-extrabold mb-2">수리 접수 신청</h1>
  <p class="text-gray-500 mb-8">아래 항목을 작성해주시면 확인 후 1영업일 이내 연락드립니다</p>

  <form id="repairForm" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 space-y-6">

    <div class="grid md:grid-cols-2 gap-5">
      <div>
        <label class="block text-sm font-bold mb-1.5">이름 <span class="text-red-500">*</span></label>
        <input type="text" name="customerName" required placeholder="홍길동"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
      </div>
      <div>
        <label class="block text-sm font-bold mb-1.5">연락처 <span class="text-red-500">*</span></label>
        <input type="tel" name="phone" required placeholder="010-0000-0000" pattern="[0-9\-]+"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-5">
      <div>
        <label class="block text-sm font-bold mb-1.5">머신 브랜드 <span class="text-red-500">*</span></label>
        <input type="text" name="deviceType" required placeholder="예: 드롱기, 브레빌 등"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
      </div>
      <div>
        <label class="block text-sm font-bold mb-1.5">모델명</label>
        <input type="text" name="modelName" placeholder="모델명 (알고 계신 경우)"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
      </div>
    </div>

    <div>
      <label class="block text-sm font-bold mb-1.5">고장 증상 설명 <span class="text-red-500">*</span></label>
      <textarea name="description" required rows="5" placeholder="예: 물은 나오는데 압력이 약해요, 전원이 안 들어와요 등 최대한 자세히 적어주세요"
        class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37] resize-none"></textarea>
    </div>

    <div>
      <label class="block text-sm font-bold mb-1.5">관련 사진 첨부 <span class="text-gray-400 font-normal">(선택, 최대 3장)</span></label>
      <input type="file" name="photos" accept="image/*" multiple id="photoInput"
        class="w-full text-sm border border-dashed border-gray-300 rounded-lg px-3.5 py-2.5 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:bg-[#eef3f1] file:text-[#1b3d37] file:text-sm">
      <div id="photoPreview" class="flex gap-2 mt-3 flex-wrap"></div>
    </div>

    <label class="flex items-start gap-2.5 text-sm text-gray-600 bg-gray-50 rounded-lg p-3.5">
      <input type="checkbox" name="agree" required class="mt-0.5">
      <span>
        개인정보 수집 및 이용에 동의합니다. (수집항목: 이름, 연락처 / 목적: AS 접수 및 처리 / 보유기간: 처리 완료 후 1년)
        <span class="text-red-500">*</span>
      </span>
    </label>

    <button type="submit" id="submitBtn"
      class="w-full bg-[#1b3d37] hover:bg-[#16302b] text-white font-semibold py-3.5 rounded-full text-sm transition flex items-center justify-center gap-2">
      <span id="submitText">수리 접수 신청</span>
    </button>
    <p id="formError" class="text-red-500 text-sm text-center hidden"></p>
  </form>
</main>

<footer class="text-center text-xs text-gray-400 pb-10">© 2026 M&H Coffee Repair. All rights reserved.</footer>

<script type="module">
  import { db, storage } from "./firebase-config.js";
  import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const form = document.getElementById('repairForm');
  const photoInput = document.getElementById('photoInput');
  const photoPreview = document.getElementById('photoPreview');
  const submitBtn = document.getElementById('submitBtn');
  const submitText = document.getElementById('submitText');
  const formError = document.getElementById('formError');

  photoInput.addEventListener('change', () => {
    photoPreview.innerHTML = '';
    const files = Array.from(photoInput.files).slice(0, 3);
    files.forEach(file => {
      const url = URL.createObjectURL(file);
      const img = document.createElement('img');
      img.src = url;
      img.className = 'w-16 h-16 object-cover rounded-lg border border-gray-200';
      photoPreview.appendChild(img);
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    formError.classList.add('hidden');
    submitBtn.disabled = true;
    submitText.innerHTML = '<span class="spinner"></span>';

    try {
      const data = Object.fromEntries(new FormData(form).entries());

      const files = Array.from(photoInput.files).slice(0, 3);
      const photoURLs = [];
      for (const file of files) {
        const path = `repairs/${Date.now()}_${file.name}`;
        const storageRef = ref(storage, path);
        await uploadBytes(storageRef, file);
        const url = await getDownloadURL(storageRef);
        photoURLs.push(url);
      }

      const docRef = await addDoc(collection(db, "repairs"), {
        customerName: data.customerName,
        phone: data.phone,
        deviceType: data.deviceType,
        modelName: data.modelName || '',
        description: data.description,
        photoURLs,
        status: '대기중',
        createdAt: serverTimestamp()
      });

      window.location.href = `confirm.html?id=${docRef.id}`;

    } catch (err) {
      console.error(err);
      formError.textContent = '접수 중 오류가 발생했습니다. Firebase 설정을 확인해 주세요. (' + err.message + ')';
      formError.classList.remove('hidden');
      submitBtn.disabled = false;
      submitText.textContent = '수리 접수 신청';
    }
  });
</script>
</body>
</html>
