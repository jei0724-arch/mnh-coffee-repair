<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>접수 완료 - M&H 엠엔에이치</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; }
</style>
</head>
<body class="bg-[#f7f4ee] text-gray-800">

<header class="bg-[#1b3d37] text-white sticky top-0 z-20">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <span class="w-9 h-9 rounded-lg bg-white/10 border border-white/20 flex items-center justify-center font-bold text-sm">M&H</span>
      <span class="leading-tight">
        <span class="block font-bold">엠엔에이치</span>
        <span class="block text-[11px] text-white/60">커피 머신 전문 수리</span>
      </span>
    </a>
    <nav class="hidden md:flex items-center gap-8 text-sm text-white/80">
      <a href="index.html" class="hover:text-white">홈</a>
      <a href="gallery.html" class="hover:text-white">수리 사례</a>
      <a href="request.html" class="hover:text-white">수리 접수</a>
      <a href="contact.html" class="hover:text-white">문의하기</a>
    </nav>
    <a href="request.html" class="bg-white text-[#1b3d37] text-sm font-semibold px-5 py-2.5 rounded-full hover:bg-gray-100">수리 접수하기</a>
  </div>
</header>

<main class="max-w-2xl mx-auto px-5 py-14">
  <div id="loading" class="text-center text-gray-400 text-sm">불러오는 중...</div>

  <div id="content" class="hidden">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-[#eef3f1] text-[#1b3d37] rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">✓</div>
      <h1 class="text-xl font-bold">접수가 완료되었습니다</h1>
      <p class="text-gray-500 text-sm mt-1">담당 엔지니어가 확인 후 순차적으로 연락드릴 예정입니다.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-4">
      <div class="flex justify-between items-center pb-4 border-b border-gray-100">
        <span class="text-sm text-gray-400">접수 번호</span>
        <span id="docId" class="font-mono text-sm font-semibold text-[#1b3d37]"></span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-sm">
        <span class="text-gray-400">신청자</span>
        <span id="customerName" class="col-span-2"></span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-sm">
        <span class="text-gray-400">연락처</span>
        <span id="phone" class="col-span-2"></span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-sm">
        <span class="text-gray-400">기기 종류</span>
        <span id="deviceType" class="col-span-2"></span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-sm">
        <span class="text-gray-400">모델명</span>
        <span id="modelName" class="col-span-2"></span>
      </div>
      <div class="grid grid-cols-3 gap-2 text-sm">
        <span class="text-gray-400">상태</span>
        <span id="status" class="col-span-2"><span class="bg-yellow-100 text-yellow-700 text-xs px-2 py-1 rounded-full"></span></span>
      </div>
      <div class="text-sm">
        <span class="text-gray-400 block mb-1">접수 내용</span>
        <p id="description" class="bg-gray-50 rounded-lg p-3 whitespace-pre-wrap"></p>
      </div>
      <div id="photoBlock" class="hidden">
        <span class="text-gray-400 text-sm block mb-2">첨부 사진</span>
        <div id="photos" class="flex gap-2 flex-wrap"></div>
      </div>
    </div>

    <a href="index.html" class="block text-center mt-8 text-sm text-[#1b3d37] hover:underline">메인으로 돌아가기</a>
  </div>

  <div id="notFound" class="hidden text-center text-gray-400 text-sm py-10">접수 내역을 찾을 수 없습니다.</div>
</main>

<script type="module">
  import { db } from "./firebase-config.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  const loading = document.getElementById('loading');
  const content = document.getElementById('content');
  const notFound = document.getElementById('notFound');

  async function load() {
    if (!id) { loading.classList.add('hidden'); notFound.classList.remove('hidden'); return; }
    try {
      const snap = await getDoc(doc(db, "repairs", id));
      loading.classList.add('hidden');
      if (!snap.exists()) { notFound.classList.remove('hidden'); return; }

      const d = snap.data();
      document.getElementById('docId').textContent = id.slice(0, 8).toUpperCase();
      document.getElementById('customerName').textContent = d.customerName;
      document.getElementById('phone').textContent = d.phone;
      document.getElementById('deviceType').textContent = d.deviceType;
      document.getElementById('modelName').textContent = d.modelName || '-';
      document.getElementById('description').textContent = d.description;
      document.querySelector('#status span').textContent = d.status || '대기중';

      if (d.photoURLs && d.photoURLs.length) {
        document.getElementById('photoBlock').classList.remove('hidden');
        const photosEl = document.getElementById('photos');
        d.photoURLs.forEach(url => {
          const a = document.createElement('a');
          a.href = url; a.target = '_blank';
          a.innerHTML = `<img src="${url}" class="w-20 h-20 object-cover rounded-lg border border-gray-200">`;
          photosEl.appendChild(a);
        });
      }
      content.classList.remove('hidden');
    } catch (err) {
      console.error(err);
      loading.classList.add('hidden');
      notFound.classList.remove('hidden');
      notFound.textContent = '오류가 발생했습니다: ' + err.message;
    }
  }
  load();
</script>
</body>
</html>
