<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 - M&H 엠엔에이치</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; }
  .tab.active { background:#1b3d37; color:#fff; }
  .spinner { border: 3px solid #e5e7eb; border-top-color: #fff; border-radius: 50%; width: 16px; height: 16px; display:inline-block; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-[#f7f4ee] text-gray-800">

<header class="bg-[#1b3d37] text-white">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <img src="logo.jpg" alt="M&H 커피머신 수리 로고" class="w-9 h-9 rounded-lg object-cover">
      <span class="leading-tight">
        <span class="block font-bold">엠엔에이치 관리자</span>
        <span class="block text-[11px] text-white/60">커피 머신 전문 수리</span>
      </span>
    </a>
    <button id="logoutBtn" class="text-sm text-white/70 hover:text-white hidden">로그아웃</button>
  </div>
</header>

<!-- 로그인 화면 -->
<div id="loginView" class="max-w-sm mx-auto mt-20 px-6">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <h1 class="text-lg font-bold mb-6 text-center">관리자 로그인</h1>
    <form id="loginForm" class="space-y-3">
      <input type="email" id="email" required placeholder="이메일"
        class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
      <input type="password" id="password" required placeholder="비밀번호"
        class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
      <button type="submit" class="w-full bg-[#1b3d37] hover:bg-[#16302b] text-white font-semibold py-2.5 rounded-full text-sm">로그인</button>
      <p id="loginError" class="text-red-500 text-xs text-center hidden"></p>
    </form>
    <p class="text-xs text-gray-400 mt-4 text-center">
      Firebase 콘솔 &gt; Authentication &gt; 사용자 추가에서<br>관리자 계정을 먼저 만들어 주세요.
    </p>
  </div>
</div>

<!-- 대시보드 -->
<main id="dashboardView" class="max-w-6xl mx-auto px-6 py-8 hidden">

  <div class="flex flex-wrap gap-2 mb-6">
    <button data-view="repairs" class="viewTab tab active text-sm font-medium px-4 py-2 rounded-full bg-white border border-gray-200">접수 리스트</button>
    <button data-view="inquiries" class="viewTab tab text-sm font-medium px-4 py-2 rounded-full bg-white border border-gray-200">문의 리스트</button>
    <button data-view="cases" class="viewTab tab text-sm font-medium px-4 py-2 rounded-full bg-white border border-gray-200">수리 사례 관리</button>
  </div>

  <!-- 접수 리스트 -->
  <section id="repairsView">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
      <h1 class="text-lg font-bold">접수 리스트</h1>
      <select id="statusFilter" class="border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
        <option value="all">전체 상태</option>
        <option value="대기중">대기중</option>
        <option value="처리중">처리중</option>
        <option value="완료">완료</option>
      </select>
    </div>

    <div id="statsRow" class="grid grid-cols-3 gap-3 mb-6"></div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
      <table class="w-full text-sm min-w-[700px]">
        <thead class="bg-gray-50 text-gray-500 text-xs">
          <tr>
            <th class="text-left px-4 py-3">접수일시</th>
            <th class="text-left px-4 py-3">이름</th>
            <th class="text-left px-4 py-3">연락처</th>
            <th class="text-left px-4 py-3">기기/모델</th>
            <th class="text-left px-4 py-3">내용</th>
            <th class="text-left px-4 py-3">사진</th>
            <th class="text-left px-4 py-3">상태</th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <p id="emptyMsg" class="text-center text-gray-400 text-sm py-10 hidden">접수 내역이 없습니다.</p>
  </section>

  <!-- 문의 리스트 -->
  <section id="inquiriesView" class="hidden">
    <h1 class="text-lg font-bold mb-6">문의 리스트</h1>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto">
      <table class="w-full text-sm min-w-[600px]">
        <thead class="bg-gray-50 text-gray-500 text-xs">
          <tr>
            <th class="text-left px-4 py-3">문의일시</th>
            <th class="text-left px-4 py-3">이름</th>
            <th class="text-left px-4 py-3">연락처</th>
            <th class="text-left px-4 py-3">문의 내용</th>
          </tr>
        </thead>
        <tbody id="inquiryTableBody" class="divide-y divide-gray-100"></tbody>
      </table>
    </div>
    <p id="inquiryEmptyMsg" class="text-center text-gray-400 text-sm py-10 hidden">문의 내역이 없습니다.</p>
  </section>

  <!-- 수리 사례 관리 -->
  <section id="casesView" class="hidden">
    <h1 id="caseFormTitle" class="text-lg font-bold mb-6">수리 사례 등록</h1>

    <form id="caseForm" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-5 mb-10">
      <div class="grid md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-bold mb-1.5">제목 <span class="text-red-500">*</span></label>
          <input type="text" name="title" required placeholder="예: 펌프 소음 및 압력 저하 수리"
            class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
        </div>
        <div>
          <label class="block text-sm font-bold mb-1.5">카테고리 <span class="text-red-500">*</span></label>
          <select name="category" required class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-[#1b3d37]">
            <option value="home">가정용 전자동 머신</option>
            <option value="commercial">상업용 그룹헤드 머신</option>
            <option value="capsule">캡슐 커피머신</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold mb-1.5">수리 내용 <span class="text-red-500">*</span></label>
        <textarea name="description" required rows="4" placeholder="증상과 수리 내용을 적어주세요"
          class="w-full border border-gray-200 rounded-lg px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#1b3d37] resize-none"></textarea>
      </div>

      <div class="grid md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-bold mb-1.5">고장 전 사진 <span class="text-gray-400 font-normal">(수정 시 비워두면 기존 사진 유지)</span></label>
          <input type="file" name="beforePhoto" accept="image/*"
            class="w-full text-sm border border-dashed border-gray-300 rounded-lg px-3.5 py-2.5 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:bg-[#eef3f1] file:text-[#1b3d37] file:text-sm">
        </div>
        <div>
          <label class="block text-sm font-bold mb-1.5">수리 후 사진 <span class="text-gray-400 font-normal">(수정 시 비워두면 기존 사진 유지)</span></label>
          <input type="file" name="afterPhoto" accept="image/*"
            class="w-full text-sm border border-dashed border-gray-300 rounded-lg px-3.5 py-2.5 file:mr-3 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:bg-[#eef3f1] file:text-[#1b3d37] file:text-sm">
        </div>
      </div>

      <div class="flex items-center gap-3">
        <button type="submit" id="caseSubmitBtn" class="bg-[#1b3d37] hover:bg-[#16302b] text-white font-semibold px-6 py-3 rounded-full text-sm">
          <span id="caseSubmitText">사례 등록</span>
        </button>
        <button type="button" id="caseCancelBtn" class="hidden text-sm text-gray-500 hover:text-gray-700">취소</button>
      </div>
      <p id="caseError" class="text-red-500 text-sm hidden"></p>
    </form>

    <h2 class="text-lg font-bold mb-4">등록된 사례</h2>
    <div id="caseList" class="grid md:grid-cols-3 gap-5"></div>
    <p id="caseEmptyMsg" class="text-center text-gray-400 text-sm py-10 hidden">등록된 사례가 없습니다.</p>
  </section>
</main>

<script type="module">
  import { db, auth, storage } from "./firebase-config.js";
  import { collection, query, orderBy, onSnapshot, doc, updateDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { ref, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const loginView = document.getElementById('loginView');
  const dashboardView = document.getElementById('dashboardView');
  const logoutBtn = document.getElementById('logoutBtn');
  const loginForm = document.getElementById('loginForm');
  const loginError = document.getElementById('loginError');
  const tableBody = document.getElementById('tableBody');
  const statusFilter = document.getElementById('statusFilter');
  const statsRow = document.getElementById('statsRow');
  const emptyMsg = document.getElementById('emptyMsg');
  const inquiryTableBody = document.getElementById('inquiryTableBody');
  const inquiryEmptyMsg = document.getElementById('inquiryEmptyMsg');
  const caseForm = document.getElementById('caseForm');
  const caseSubmitBtn = document.getElementById('caseSubmitBtn');
  const caseSubmitText = document.getElementById('caseSubmitText');
  const caseError = document.getElementById('caseError');
  const caseList = document.getElementById('caseList');
  const caseEmptyMsg = document.getElementById('caseEmptyMsg');
  const caseFormTitle = document.getElementById('caseFormTitle');
  const caseCancelBtn = document.getElementById('caseCancelBtn');

  let allRepairs = [];
  let allInquiries = [];
  let allCases = [];
  let editingCaseId = null;

  // 뷰 탭 전환
  document.querySelectorAll('.viewTab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.viewTab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('repairsView').classList.toggle('hidden', tab.dataset.view !== 'repairs');
      document.getElementById('inquiriesView').classList.toggle('hidden', tab.dataset.view !== 'inquiries');
      document.getElementById('casesView').classList.toggle('hidden', tab.dataset.view !== 'cases');
    });
  });

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.classList.add('hidden');
    try {
      await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
    } catch (err) {
      loginError.textContent = '로그인 실패: ' + err.message;
      loginError.classList.remove('hidden');
    }
  });

  logoutBtn.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginView.classList.add('hidden');
      dashboardView.classList.remove('hidden');
      logoutBtn.classList.remove('hidden');
      subscribeRepairs();
      subscribeInquiries();
      subscribeCases();
    } else {
      loginView.classList.remove('hidden');
      dashboardView.classList.add('hidden');
      logoutBtn.classList.add('hidden');
    }
  });

  function subscribeRepairs() {
    const q = query(collection(db, "repairs"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      allRepairs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderRepairs();
    });
  }

  function subscribeInquiries() {
    const q = query(collection(db, "inquiries"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      allInquiries = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderInquiries();
    });
  }

  const statusColor = { '대기중': 'bg-yellow-100 text-yellow-700', '처리중': 'bg-blue-100 text-blue-700', '완료': 'bg-[#eef3f1] text-[#1b3d37]' };

  function renderRepairs() {
    const filter = statusFilter.value;
    const rows = filter === 'all' ? allRepairs : allRepairs.filter(r => r.status === filter);

    statsRow.innerHTML = ['대기중', '처리중', '완료'].map(s => {
      const count = allRepairs.filter(r => r.status === s).length;
      return `<div class="bg-white rounded-xl border border-gray-100 p-4 text-center">
        <div class="text-2xl font-bold">${count}</div>
        <div class="text-xs text-gray-400 mt-1">${s}</div>
      </div>`;
    }).join('');

    emptyMsg.classList.toggle('hidden', rows.length > 0);
    tableBody.innerHTML = rows.map(r => {
      const date = r.createdAt?.toDate ? r.createdAt.toDate().toLocaleString('ko-KR') : '-';
      const photos = (r.photoURLs || []).map(url => `<a href="${url}" target="_blank" class="inline-block"><img src="${url}" class="w-8 h-8 rounded object-cover inline-block mr-1"></a>`).join('') || '-';
      return `<tr>
        <td class="px-4 py-3 whitespace-nowrap text-gray-500 text-xs">${date}</td>
        <td class="px-4 py-3">${r.customerName}</td>
        <td class="px-4 py-3 whitespace-nowrap">${r.phone}</td>
        <td class="px-4 py-3">${r.deviceType}${r.modelName ? ' / ' + r.modelName : ''}</td>
        <td class="px-4 py-3 max-w-[220px] truncate" title="${r.description}">${r.description}</td>
        <td class="px-4 py-3">${photos}</td>
        <td class="px-4 py-3">
          <select data-id="${r.id}" class="statusSelect text-xs rounded-full px-2 py-1 border-0 ${statusColor[r.status] || 'bg-gray-100'}">
            <option ${r.status === '대기중' ? 'selected' : ''}>대기중</option>
            <option ${r.status === '처리중' ? 'selected' : ''}>처리중</option>
            <option ${r.status === '완료' ? 'selected' : ''}>완료</option>
          </select>
        </td>
      </tr>`;
    }).join('');

    document.querySelectorAll('.statusSelect').forEach(sel => {
      sel.addEventListener('change', async (e) => {
        await updateDoc(doc(db, "repairs", e.target.dataset.id), { status: e.target.value });
      });
    });
  }

  function renderInquiries() {
    inquiryEmptyMsg.classList.toggle('hidden', allInquiries.length > 0);
    inquiryTableBody.innerHTML = allInquiries.map(q => {
      const date = q.createdAt?.toDate ? q.createdAt.toDate().toLocaleString('ko-KR') : '-';
      return `<tr>
        <td class="px-4 py-3 whitespace-nowrap text-gray-500 text-xs">${date}</td>
        <td class="px-4 py-3">${q.name}</td>
        <td class="px-4 py-3 whitespace-nowrap">${q.phone}</td>
        <td class="px-4 py-3 max-w-[320px]">${q.message}</td>
      </tr>`;
    }).join('');
  }

  statusFilter.addEventListener('change', renderRepairs);

  // ── 수리 사례 관리 ──
  const categoryLabel = { home: '가정용 전자동 머신', commercial: '상업용 그룹헤드 머신', capsule: '캡슐 커피머신' };

  function subscribeCases() {
    const q = query(collection(db, "cases"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      allCases = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderCases();
    });
  }

  function renderCases() {
    caseEmptyMsg.classList.toggle('hidden', allCases.length > 0);
    caseList.innerHTML = allCases.map(c => `
      <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
        <div class="grid grid-cols-2">
          ${c.beforeURL ? `<img src="${c.beforeURL}" class="w-full h-28 object-cover">` : `<div class="w-full h-28 bg-gray-100 flex items-center justify-center text-xs text-gray-400">고장 전</div>`}
          ${c.afterURL ? `<img src="${c.afterURL}" class="w-full h-28 object-cover">` : `<div class="w-full h-28 bg-gray-100 flex items-center justify-center text-xs text-gray-400">수리 후</div>`}
        </div>
        <div class="p-4">
          <span class="text-xs text-gray-400">${categoryLabel[c.category] || c.category}</span>
          <h3 class="font-bold text-sm mt-1">${c.title}</h3>
          <div class="flex gap-3 mt-3">
            <button data-id="${c.id}" class="editCaseBtn text-xs text-[#1b3d37] hover:underline">수정</button>
            <button data-id="${c.id}" class="deleteCaseBtn text-xs text-red-500 hover:underline">삭제</button>
          </div>
        </div>
      </div>
    `).join('');

    document.querySelectorAll('.deleteCaseBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('이 사례를 삭제할까요?')) return;
        await deleteDoc(doc(db, "cases", btn.dataset.id));
        if (editingCaseId === btn.dataset.id) resetCaseForm();
      });
    });

    document.querySelectorAll('.editCaseBtn').forEach(btn => {
      btn.addEventListener('click', () => startEditCase(btn.dataset.id));
    });
  }

  function startEditCase(id) {
    const c = allCases.find(x => x.id === id);
    if (!c) return;
    editingCaseId = id;
    caseForm.title.value = c.title || '';
    caseForm.category.value = c.category || 'home';
    caseForm.description.value = c.description || '';
    caseForm.beforePhoto.value = '';
    caseForm.afterPhoto.value = '';
    caseFormTitle.textContent = '수리 사례 수정';
    caseSubmitText.textContent = '수정 완료';
    caseCancelBtn.classList.remove('hidden');
    caseForm.scrollIntoView({ behavior: 'smooth' });
  }

  function resetCaseForm() {
    editingCaseId = null;
    caseForm.reset();
    caseFormTitle.textContent = '수리 사례 등록';
    caseSubmitText.textContent = '사례 등록';
    caseCancelBtn.classList.add('hidden');
  }

  caseCancelBtn.addEventListener('click', resetCaseForm);

  caseForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    caseError.classList.add('hidden');
    caseSubmitBtn.disabled = true;
    caseSubmitText.innerHTML = '<span class="spinner"></span>';

    try {
      const data = Object.fromEntries(new FormData(caseForm).entries());
      const beforeFile = caseForm.beforePhoto.files[0];
      const afterFile = caseForm.afterPhoto.files[0];

      let beforeURL, afterURL;
      if (beforeFile) {
        const r = ref(storage, `cases/${Date.now()}_before_${beforeFile.name}`);
        await uploadBytes(r, beforeFile);
        beforeURL = await getDownloadURL(r);
      }
      if (afterFile) {
        const r = ref(storage, `cases/${Date.now()}_after_${afterFile.name}`);
        await uploadBytes(r, afterFile);
        afterURL = await getDownloadURL(r);
      }

      if (editingCaseId) {
        const update = {
          title: data.title,
          category: data.category,
          description: data.description,
        };
        if (beforeURL !== undefined) update.beforeURL = beforeURL;
        if (afterURL !== undefined) update.afterURL = afterURL;
        await updateDoc(doc(db, "cases", editingCaseId), update);
      } else {
        await addDoc(collection(db, "cases"), {
          title: data.title,
          category: data.category,
          description: data.description,
          beforeURL: beforeURL || '',
          afterURL: afterURL || '',
          createdAt: serverTimestamp()
        });
      }

      resetCaseForm();
    } catch (err) {
      console.error(err);
      caseError.textContent = (editingCaseId ? '수정' : '등록') + ' 중 오류가 발생했습니다. (' + err.message + ')';
      caseError.classList.remove('hidden');
    } finally {
      caseSubmitBtn.disabled = false;
      caseSubmitText.textContent = editingCaseId ? '수정 완료' : '사례 등록';
    }
  });
</script>
</body>
</html>
