<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수리 사례 상세 - M&H 엠엔에이치</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background:#f7f4ee; color:#1f2937; }
  .stripe { background-image: repeating-linear-gradient(45deg, #ded4bd 0, #ded4bd 2px, #e9e1d0 2px, #e9e1d0 14px); }
  .stripe-after { background-image: repeating-linear-gradient(45deg, #cfe0da 0, #cfe0da 2px, #e2eee9 2px, #e2eee9 14px); }
</style>
</head>
<body>

<header class="bg-[#1b3d37] text-white sticky top-0 z-20">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <img src="logo.jpg" alt="M&H 커피머신 수리 로고" class="w-9 h-9 rounded-lg object-cover">
      <span class="leading-tight">
        <span class="block font-bold">엠엔에이치</span>
        <span class="block text-[11px] text-white/60">커피 머신 전문 수리</span>
      </span>
    </a>
    <nav class="hidden md:flex items-center gap-8 text-sm text-white/80">
      <a href="index.html" class="hover:text-white">홈</a>
      <a href="gallery.html" class="text-white font-medium">수리 사례</a>
      <a href="request.html" class="hover:text-white">수리 접수</a>
      <a href="track.html" class="hover:text-white">접수 조회</a>
      <a href="contact.html" class="hover:text-white">문의하기</a>
    </nav>
    <a href="request.html" class="bg-white text-[#1b3d37] text-sm font-semibold px-5 py-2.5 rounded-full hover:bg-gray-100">수리 접수하기</a>
  </div>
</header>

<main class="max-w-4xl mx-auto px-6 py-14">
  <a href="gallery.html" class="text-sm text-gray-500 hover:text-gray-700">← 목록으로</a>

  <div class="mt-6">
    <span id="tag" class="text-xs text-gray-400"></span>
    <h1 id="title" class="text-2xl font-extrabold mt-1"></h1>
    <p id="meta" class="text-sm text-gray-400 mt-1"></p>
  </div>

  <div class="grid md:grid-cols-2 gap-4 mt-8">
    <div id="beforeBox" class="stripe rounded-2xl aspect-[4/3] flex items-center justify-center text-gray-400 text-sm overflow-hidden">고장 전 사진</div>
    <div id="afterBox" class="stripe-after rounded-2xl aspect-[4/3] flex items-center justify-center text-gray-400 text-sm overflow-hidden">수리 후 사진</div>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 p-6 mt-8">
    <h2 class="font-bold mb-3">수리 내용</h2>
    <p id="desc" class="text-sm text-gray-600 leading-relaxed"></p>
  </div>
</main>

<footer class="text-center text-xs text-gray-400 pb-10">© 2026 M&H Coffee Repair. All rights reserved. · <a href="https://blog.naver.com/mnh2311" target="_blank" rel="noopener" class="hover:text-gray-500">블로그</a> · <a href="admin.html" class="hover:text-gray-500">관리자</a></footer>

<script type="module">
  import { db } from "./firebase-config.js";
  import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const categoryLabel = { home: '가정용 전자동 머신', commercial: '상업용 그룹헤드 머신', capsule: '캡슐 커피머신' };

  const id = new URLSearchParams(location.search).get('id');

  async function load() {
    if (!id) return;
    const snap = await getDoc(doc(db, "cases", id));
    if (!snap.exists()) {
      document.getElementById('title').textContent = '사례를 찾을 수 없습니다.';
      return;
    }
    const c = snap.data();
    const date = c.createdAt?.toDate ? c.createdAt.toDate().toLocaleDateString('ko-KR') : '';

    document.getElementById('tag').textContent = categoryLabel[c.category] || c.category;
    document.getElementById('title').textContent = c.title;
    document.getElementById('meta').textContent = date;
    document.getElementById('desc').textContent = c.description;

    if (c.beforeURL) document.getElementById('beforeBox').innerHTML = `<img src="${c.beforeURL}" class="w-full h-full object-cover">`;
    if (c.afterURL) document.getElementById('afterBox').innerHTML = `<img src="${c.afterURL}" class="w-full h-full object-cover">`;
  }
  load();
</script>
</body>
</html>
