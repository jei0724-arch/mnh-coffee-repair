<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수리 사례 갤러리 - M&H 엠엔에이치</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", sans-serif; background:#f7f4ee; color:#1f2937; }
  .stripe { background-image: repeating-linear-gradient(45deg, #ded4bd 0, #ded4bd 2px, #e9e1d0 2px, #e9e1d0 14px); }
  .tab.active { background:#1b3d37; color:#fff; }
</style>
</head>
<body>

<header class="bg-[#1b3d37] text-white sticky top-0 z-20">
  <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <img src="logo.jpg" alt="M&H 커피머신 수리 로고" class="w-9 h-9 rounded-lg object-cover">
      <span class="leading-tight">
        <span class="block font-bold">엠엔에이치</span>
        <span class="block text-[11px] text-white/60">커피 머신 전문 수리</span>
      </span>
    </a>
    <nav class="hidden md:flex items-center gap-8 text-sm text-white/80">
      <a href="index.html" class="hover:text-white">홈</a>
      <a href="gallery.html" class="text-white font-medium">수리 사례</a>
      <a href="request.html" class="hover:text-white">수리 접수</a>
      <a href="track.html" class="hover:text-white">접수 조회</a>
      <a href="contact.html" class="hover:text-white">문의하기</a>
    </nav>
    <div class="flex items-center gap-3">
      <a href="request.html" class="hidden sm:inline-block bg-white text-[#1b3d37] text-sm font-semibold px-5 py-2.5 rounded-full hover:bg-gray-100">수리 접수하기</a>
      <button id="mobileMenuBtn" class="md:hidden text-white" aria-label="메뉴 열기">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
  <div id="mobileMenu" class="hidden md:hidden bg-[#16302b] px-6 py-4 space-y-1 text-sm">
    <a href="index.html" class="block py-2 text-white/80">홈</a>
    <a href="gallery.html" class="block py-2 text-white font-medium">수리 사례</a>
    <a href="request.html" class="block py-2 text-white/80">수리 접수</a>
    <a href="track.html" class="block py-2 text-white/80">접수 조회</a>
    <a href="contact.html" class="block py-2 text-white/80">문의하기</a>
    <a href="https://blog.naver.com/mnh2311" target="_blank" rel="noopener" class="block py-2 text-white/80">블로그</a>
  </div>
</header>
<script>
  document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
    document.getElementById('mobileMenu').classList.toggle('hidden');
  });
</script>

<main class="max-w-6xl mx-auto px-6 py-14">
  <h1 class="text-3xl font-extrabold mb-2">수리 사례 갤러리</h1>
  <p class="text-gray-500 mb-8">실제 진행한 수리 건들을 Before / After 사진과 함께 소개합니다</p>

  <div class="flex flex-wrap gap-2 mb-8" id="tabs">
    <button data-cat="all" class="tab active text-sm font-medium px-4 py-2 rounded-full bg-white border border-gray-200">전체</button>
    <button data-cat="home" class="tab text-sm font-medium px-4 py-2 rounded-full bg-white border border-gray-200">가정용 전자동 머신</button>
    <button data-cat="commercial" class="tab text-sm font-medium px-4 py-2 rounded-full bg-white border border-gray-200">상업용 그룹헤드 머신</button>
    <button data-cat="capsule" class="tab text-sm font-medium px-4 py-2 rounded-full bg-white border border-gray-200">캡슐 커피머신</button>
  </div>

  <div id="cards" class="grid md:grid-cols-3 gap-6"></div>
</main>

<footer class="text-center text-xs text-gray-400 pb-10">© 2026 M&H Coffee Repair. All rights reserved. · <a href="https://blog.naver.com/mnh2311" target="_blank" rel="noopener" class="hover:text-gray-500">블로그</a> · <a href="admin.html" class="hover:text-gray-500">관리자</a></footer>

<script type="module">
  import { db } from "./firebase-config.js";
  import { collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const categoryLabel = { home: '가정용 전자동 머신', commercial: '상업용 그룹헤드 머신', capsule: '캡슐 커피머신' };

  const cardsEl = document.getElementById('cards');
  const tabs = document.querySelectorAll('.tab');
  let allCases = [];

  function render(cat) {
    const list = cat === 'all' ? allCases : allCases.filter(c => c.category === cat);
    if (!list.length) {
      cardsEl.innerHTML = `<p class="text-gray-400 text-sm col-span-3 text-center py-10">등록된 수리 사례가 없습니다.</p>`;
      return;
    }
    cardsEl.innerHTML = list.map(c => {
      const date = c.createdAt?.toDate ? c.createdAt.toDate().toLocaleDateString('ko-KR') : '';
      const thumb = c.afterURL || c.beforeURL;
      return `
      <a href="case-detail.html?id=${c.id}" class="block bg-white rounded-2xl border border-gray-100 overflow-hidden hover:shadow-md transition">
        ${thumb
          ? `<img src="${thumb}" class="aspect-[4/3] w-full object-cover">`
          : `<div class="stripe aspect-[4/3] flex items-center justify-center text-gray-400 text-sm">Before / After 사진</div>`}
        <div class="p-4">
          <span class="text-xs text-gray-400">${categoryLabel[c.category] || c.category}</span>
          <h3 class="font-bold mt-1">${c.title}</h3>
          <span class="text-xs text-gray-400">${date}</span>
        </div>
      </a>`;
    }).join('');
  }

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      render(tab.dataset.cat);
    });
  });

  async function load() {
    const q = query(collection(db, "cases"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    allCases = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render('all');
  }
  load();
</script>
</body>
</html>
